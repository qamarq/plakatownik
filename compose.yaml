services:
  backend:
    build: ./backend
    volumes:
      - poster_cache:/app/data/cache
      - poster_output:/app/data/posters
    environment:
      # Switch to another mirror (e.g. https://overpass.private.coffee/api)
      # or a self-hosted instance if this one is congested.
      - OVERPASS_URL=https://overpass-api.de/api
      - MAX_CONCURRENT_JOBS=2
    restart: unless-stopped

  # Serves the built frontend and reverse-proxies /api and /ws to the
  # backend (see frontend/nginx.conf), so only one port needs exposing.
  frontend:
    build: ./frontend
    ports:
      - "8080:80"
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  poster_cache:
  poster_output:
